<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CafeBuzz | Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0d0a09;--surface:#141009;--card:#1a1209;--card2:#1f1510;
      --border:rgba(255,255,255,0.07);--accent:#F5A623;--accent2:rgba(245,166,35,0.12);
      --text:#f0e8dc;--muted:rgba(240,232,220,0.5);
      --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    /* TOP BAR */
    .abar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(18,13,11,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
    .abar-logo{font-size:24px;font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
    .abar-title{font-size:15px;color:var(--muted);margin-left:14px;padding-left:14px;border-left:1px solid var(--border);}
    .abar-right{display:flex;align-items:center;gap:16px;}
    .abar-clock{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;margin-right:10px;}
    
    .action-btn{padding:10px 20px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;text-decoration:none;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;}
    .reset-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);}
    .reset-btn:hover{background:rgba(239,68,68,0.2);transform:translateY(-2px);}
    .qr-btn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--accent);}
    .qr-btn:hover{background:rgba(245,166,35,0.2);transform:translateY(-2px);}
    .kitchen-btn{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green);}
    .kitchen-btn:hover{background:rgba(16,185,129,0.2);transform:translateY(-2px);}

    /* LAYOUT */
    .body-wrap{display:flex;flex:1;overflow:hidden;background:radial-gradient(circle at top right, rgba(245,166,35,0.05), transparent 40%);}
    .main-col{flex:1;overflow-y:auto;padding:32px;}
    .side-col{width:380px;background:rgba(20,15,12,0.6);backdrop-filter:blur(10px);border-left:1px solid var(--border);overflow-y:auto;padding:28px;}

    /* STAT CARDS */
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:36px;}
    .scard{background:rgba(255,255,255,0.03);border:1px solid var(--border);backdrop-filter:blur(10px);border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:flex-start;gap:16px;transition:0.3s;}
    .scard:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 10px 30px rgba(0,0,0,0.2);}
    .scard-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .scard-val{font-size:36px;font-weight:900;line-height:1;margin-bottom:6px;}
    .scard-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .bg-blue{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
    .bg-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);}
    .bg-green{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
    .bg-accent{background:rgba(245,166,35,0.15);color:var(--accent);border:1px solid rgba(245,166,35,0.3);}

    /* SECTION TITLE */
    .sec-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:12px;letter-spacing:0.5px;}
    .sec-title i{color:var(--accent);background:rgba(245,166,35,0.1);padding:8px;border-radius:8px;}

    /* FLOOR PLAN */
    .floor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:40px;}
    .table-tile{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;}
    .table-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:transparent;transition:0.3s;}
    .table-tile:hover{transform:translateY(-5px);box-shadow:0 12px 24px rgba(0,0,0,0.3);}
    
    .table-tile.free::before{background:var(--green);}
    .table-tile.occupied::before{background:var(--yellow);}
    .table-tile.bill::before{background:var(--purple);}
    .table-tile.ready-up::before{background:var(--green);box-shadow:0 0 15px var(--green);}
    
    .table-tile.free{background:linear-gradient(to bottom, rgba(16,185,129,0.05), transparent);}
    .table-tile.occupied{background:linear-gradient(to bottom, rgba(245,158,11,0.05), transparent);}
    .table-tile.bill{background:linear-gradient(to bottom, rgba(139,92,246,0.05), transparent);}
    
    .tt-num{font-size:28px;font-weight:900;margin-bottom:8px;color:var(--text);}
    .tt-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:50px;display:inline-block;margin-bottom:12px;}
    .free .tt-label{background:rgba(16,185,129,0.1);color:var(--green);}
    .occupied .tt-label{background:rgba(245,158,11,0.1);color:var(--yellow);}
    .bill .tt-label{background:rgba(139,92,246,0.1);color:var(--purple);}
    .ready-up .tt-label{background:rgba(16,185,129,0.2);color:var(--green);animation:pulse-label 1.5s infinite;}
    
    @keyframes pulse-label{0%,100%{transform:scale(1);}50%{transform:scale(1.05);box-shadow:0 0 10px rgba(16,185,129,0.4);}}
    
    .tt-order{font-size:12px;color:var(--muted);font-family:monospace;}
    .tt-amount{font-size:18px;font-weight:800;color:var(--accent);margin-top:6px;}
    .tt-seats{position:absolute;top:12px;right:14px;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:6px;font-weight:600;}

    /* CLEAR TABLE BTN */
    .clear-tile-btn{display:none;margin-top:16px;width:100%;padding:10px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.4);color:#a78bfa;border-radius:10px;cursor:pointer;font-size:13px;font-weight:800;transition:0.2s;}
    .table-tile.bill .clear-tile-btn{display:block;}
    .clear-tile-btn:hover{background:rgba(139,92,246,0.3);color:#fff;}

    /* LEGEND */
    .legend{display:flex;gap:18px;margin-bottom:24px;flex-wrap:wrap;align-items:center;background:rgba(255,255,255,0.02);padding:12px 20px;border-radius:12px;border:1px solid var(--border);width:fit-content;}
    .leg{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
    .leg-dot{width:12px;height:12px;border-radius:50%;}

    /* ORDERS TABLE */
    .table-container{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:20px;overflow:hidden;backdrop-filter:blur(10px);}
    .orders-table{width:100%;border-collapse:collapse;font-size:14px;}
    .orders-table th{padding:16px 20px;text-align:left;color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);}
    .orders-table td{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.03);}
    .orders-table tr:hover td{background:rgba(255,255,255,0.03);}
    
    .status-pill{display:inline-block;padding:6px 14px;border-radius:50px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}

    /* SIDEBAR */
    .side-title{font-size:18px;font-weight:800;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
    .side-title i{color:var(--accent);}
    .detail-card{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:20px;}
    .detail-card h4{font-size:12px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
    .detail-item{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
    .detail-item:last-child{border:none;}
    .detail-total{font-weight:900;color:var(--accent);font-size:18px;margin-top:12px;padding-top:16px;border-top:1px dashed rgba(245,166,35,0.3)!important;}
    
    .side-act-btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;transition:all 0.2s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-clear-table{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.3);}
    .btn-clear-table:hover{background:rgba(139,92,246,0.3);color:#fff;}
    .btn-kitchen{background:rgba(245,166,35,0.1);color:var(--accent);border:1px solid rgba(245,166,35,0.3);text-decoration:none;}
    .btn-kitchen:hover{background:rgba(245,166,35,0.2);color:#fff;}


    /* SCROLLBAR */
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="abar">
  <div style="display:flex;align-items:center;">
    <a href="portal.html" class="abar-logo" style="text-decoration:none;color:var(--accent);">CafeBuzz</a>
    <span class="abar-title">Manager Dashboard</span>
  </div>
  <div class="abar-right">
    <span class="abar-clock" id="adm-clock">--:--</span>
    <a href="qr.html" class="qr-btn"><i class="fas fa-qrcode"></i> QR Codes</a>
    <a href="kitchen.html" class="qr-btn" style="color:#10b981;border-color:#10b981;background:rgba(16,185,129,0.1);"><i class="fas fa-utensils"></i> Kitchen</a>
    <button class="reset-btn" id="reset-all-btn"><i class="fas fa-rotate-left"></i> Reset Day</button>
  </div>
</header>

<div class="body-wrap">

  <!-- MAIN COLUMN -->
  <div class="main-col">

    <!-- STAT CARDS -->
    <div class="stat-row">
      <div class="scard">
        <div class="scard-icon bg-accent"><i class="fas fa-indian-rupee-sign"></i></div>
        <div><div class="scard-val c-accent" id="s-revenue">₹0</div><div class="scard-lbl">Revenue Today</div></div>
      </div>
      <div class="scard">
        <div class="scard-icon bg-blue"><i class="fas fa-receipt"></i></div>
        <div><div class="scard-val c-blue" id="s-orders">0</div><div class="scard-lbl">Orders Today</div></div>
      </div>
      <div class="scard">
        <div class="scard-icon bg-yellow"><i class="fas fa-chair"></i></div>
        <div><div class="scard-val c-yellow" id="s-tables">0</div><div class="scard-lbl">Tables Occupied</div></div>
      </div>
      <div class="scard">
        <div class="scard-icon bg-green"><i class="fas fa-star"></i></div>
        <div><div class="scard-val c-green" id="s-avg">₹0</div><div class="scard-lbl">Avg Order Value</div></div>
      </div>
    </div>

    <!-- FLOOR PLAN -->
    <div class="sec-title"><i class="fas fa-map-marked-alt"></i>Live Floor View</div>
    <div class="legend">
      <span class="leg"><span class="leg-dot" style="background:var(--green)"></span>Free</span>
      <span class="leg"><span class="leg-dot" style="background:var(--yellow)"></span>Occupied</span>
      <span class="leg"><span class="leg-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span>Order Ready</span>
      <span class="leg"><span class="leg-dot" style="background:var(--purple)"></span>Bill Pending</span>
    </div>
    <div class="floor-grid" id="floor-grid"></div>

    <!-- ORDERS LOG -->
    <div class="sec-title" style="margin-top:8px;"><i class="fas fa-clock-rotate-left"></i>Today's Orders</div>
    <div style="overflow-x:auto;">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order ID</th><th>Table</th><th>Items</th>
            <th>Total</th><th>Placed At</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- SIDE COLUMN -->
  <div class="side-col">
    <div class="side-title"><i class="fas fa-table" style="color:var(--accent);margin-right:8px;"></i>Table Details</div>
    <div id="side-content">
      <div class="no-select-msg">
        <i class="fas fa-hand-pointer"></i>
        Click a table on the floor plan to see details
      </div>
    </div>
  </div>

</div>

<script src="store.js"></script>
<script>
  let selectedTable = null;

  // ── CLOCK ─────────────────────────────────────────────────
  function tick() {
    document.getElementById('adm-clock').textContent =
      new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
  tick(); setInterval(tick, 1000);

  // ── RENDER ALL ────────────────────────────────────────────
  function renderAll() {
    renderStats();
    renderFloor();
    renderOrders();
    if (selectedTable) renderSidebar(selectedTable);
  }

  // ── STATS ─────────────────────────────────────────────────
  function renderStats() {
    const st = Store.getTodayStats();
    const tables = Store.getTables();
    document.getElementById('s-revenue').textContent = '₹' + st.revenue.toLocaleString();
    document.getElementById('s-orders').textContent  = st.totalOrders;
    document.getElementById('s-tables').textContent  = tables.filter(t => t.status !== 'free').length;
    document.getElementById('s-avg').textContent     = '₹' + st.avgValue;
  }

  // ── FLOOR PLAN ────────────────────────────────────────────
  function renderFloor() {
    const tables = Store.getTables();
    const orders = Store.getOrders();
    const grid   = document.getElementById('floor-grid');
    grid.innerHTML = tables.map(t => {
      const order   = t.currentOrderId ? orders.find(o => o.id === t.currentOrderId) : null;
      const isReady = order && order.status === 'ready';
      const cls     = t.status === 'free' ? 'free'
                    : isReady             ? 'ready-up'
                    : t.status === 'bill' ? 'bill'
                    : 'occupied';
      const label   = { free:'Free', occupied:'Ordering', bill:'Bill', 'ready-up':'Order Ready!' }[cls] || t.status;

      return `
        <div class="table-tile ${cls}" onclick="selectTable(${t.id})">
          <span class="tt-seats"><i class="fas fa-user"></i> ${t.seats}</span>
          <div class="tt-num">T${t.id}</div>
          <div class="tt-status-dot"></div>
          <div class="tt-label">${label}</div>
          ${order ? `<div class="tt-order">${order.id}</div><div class="tt-amount">₹${order.total}</div>` : ''}
          ${t.status === 'bill'
            ? `<button class="clear-tile-btn" onclick="event.stopPropagation();clearTable(${t.id})"><i class="fas fa-check"></i> Clear Table</button>`
            : ''}
        </div>`;
    }).join('');
  }

  // ── ORDERS LOG ────────────────────────────────────────────
  function renderOrders() {
    const all   = Store.getOrders();
    const today = new Date().toDateString();
    const rows  = all
      .filter(o => new Date(o.timestamp).toDateString() === today)
      .sort((a,b) => b.timestamp - a.timestamp);

    const tbody = document.getElementById('orders-tbody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted);">No orders yet today</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(o => {
      const spClass = `sp-${o.status}`;
      const itemSummary = o.items.map(i => `${i.qty}× ${i.name}`).join(', ');
      const shortSummary = itemSummary.length > 40 ? itemSummary.slice(0,40)+'…' : itemSummary;
      return `
        <tr>
          <td style="font-weight:700;color:var(--accent)">${o.id}</td>
          <td>Table ${o.tableId}</td>
          <td style="color:var(--muted)">${shortSummary}</td>
          <td style="font-weight:700">₹${o.total}</td>
          <td style="color:var(--muted)">${o.placedAt}</td>
          <td><span class="status-pill ${spClass}">${o.status}</span></td>
        </tr>`;
    }).join('');
  }

  // ── SIDEBAR ───────────────────────────────────────────────
  function selectTable(id) {
    selectedTable = id;
    renderSidebar(id);
  }

  function renderSidebar(id) {
    const table = Store.getTable(id);
    const order = Store.getTableOrder(id);
    const side  = document.getElementById('side-content');

    if (!table) return;

    const statusColor = {free:'var(--green)',occupied:'var(--yellow)',bill:'var(--purple)'}[table.status] || 'var(--muted)';

    let html = `
      <div class="detail-card">
        <h4>Table ${id} · ${table.seats} Seats</h4>
        <div class="detail-item">
          <span>Status</span>
          <span style="color:${statusColor};font-weight:700;text-transform:capitalize">${table.status}</span>
        </div>
        <div class="detail-item">
          <span>Current Order</span>
          <span>${table.currentOrderId || '—'}</span>
        </div>
      </div>`;

    if (order) {
      html += `
        <div class="detail-card">
          <h4>Order Details</h4>
          ${order.items.map(i => `
            <div class="detail-item">
              <span>${i.qty}× ${i.name}</span>
              <span>₹${i.price*i.qty}</span>
            </div>`).join('')}
          <div class="detail-item detail-total">
            <span>Total</span><span>₹${order.total}</span>
          </div>
          ${order.notes ? `<div style="margin-top:10px;font-size:12px;color:var(--muted)">📝 ${order.notes}</div>` : ''}
        </div>
        <div class="detail-card">
          <h4>Timeline</h4>
          <div class="detail-item"><span>Placed</span><span>${order.placedAt||'—'}</span></div>
          <div class="detail-item"><span>Ready</span><span>${order.readyAt||'—'}</span></div>
          <div class="detail-item"><span>Served</span><span>${order.servedAt||'—'}</span></div>
        </div>`;

      if (table.status === 'bill') {
        html += `<button class="side-act-btn btn-clear-table" onclick="clearTable(${id})">
          <i class="fas fa-check-circle"></i> Clear Table & Close Bill
        </button>`;
      }
    } else {
      html += `<div class="no-select-msg" style="padding:20px 0">
        <i class="fas fa-coffee" style="font-size:28px;"></i>
        <p>This table is currently free</p>
        <a href="table.html?table=${id}" target="_blank" style="display:inline-block;margin-top:12px;color:var(--accent);font-size:13px;text-decoration:none;border:1px solid var(--accent);padding:6px 14px;border-radius:8px;">
          <i class="fas fa-external-link-alt"></i> Open Table ${id} Screen
        </a>
      </div>`;
    }

    html += `<a href="kitchen.html" target="_blank" class="side-act-btn btn-kitchen" style="text-decoration:none;margin-top:4px;">
      <i class="fas fa-utensils"></i> View Kitchen Screen
    </a>`;

    side.innerHTML = html;
  }

  function clearTable(id) {
    if (!confirm(`Clear Table ${id} and close the bill?`)) return;
    Store.clearTable(id);
    selectedTable = null;
    document.getElementById('side-content').innerHTML =
      `<div class="no-select-msg"><i class="fas fa-check-circle" style="color:var(--green);opacity:1"></i><p>Table ${id} cleared!</p></div>`;
    renderAll();
  }

  // ── RESET DAY ─────────────────────────────────────────────
  document.getElementById('reset-all-btn').addEventListener('click', () => {
    if (!confirm('Reset all tables and orders? This clears everything.')) return;
    Store.resetAll();
    selectedTable = null;
    renderAll();
  });

  // ── LIVE UPDATES ─────────────────────────────────────────
  Store.onUpdate(() => renderAll());

  // ── INIT ─────────────────────────────────────────────────
  renderAll();
  setInterval(renderAll, 5000);
</script>
</body>
</html>
